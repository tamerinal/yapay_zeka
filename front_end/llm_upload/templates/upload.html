<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LLM Upload</title>
</head>
<body>
  <h1>Upload LLM File</h1>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul>
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
  <form method="post" enctype="multipart/form-data">
    <input type="file" name="file">
    <input type="submit" value="Upload">
  </form>
</body>
</html>
